name: CI

# Когда запускать workflow
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Глобальные переменные окружения для всех job-ов
env:
  PYTHON_VERSION: "3.12"
  # Минимально необходимые Django-настройки для импорта config.settings.
  # Тесты используют config.test_settings (SQLite in-memory), но при импорте
  # базового settings.py всё равно читаются эти переменные.
  DJANGO_SECRET_KEY: "ci-test-secret-key-not-used-in-production"
  DJANGO_DEBUG: "False"
  DJANGO_ALLOWED_HOSTS: "*"
  POSTGRES_DB: "ci"
  POSTGRES_USER: "ci"
  POSTGRES_PASSWORD: "ci"
  POSTGRES_HOST: "localhost"
  POSTGRES_PORT: "5432"

jobs:
  # ---------- Job 1: линтеры ----------
  lint:
    name: Lint (ruff + black)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
          cache-dependency-path: requirements.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Ruff check
        run: ruff check .

      - name: Black check
        run: black --check .

  # ---------- Job 2: тесты ----------
  test:
    name: Tests (pytest)
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
          cache-dependency-path: requirements.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run pytest
        run: pytest -v
