# -----------------------------------------------------------------------------
# Конфигурация инструментов качества кода для проекта M3AleZharShop.
# -----------------------------------------------------------------------------

[tool.black]
line-length = 100
target-version = ["py312"]
extend-exclude = '''
/(
    \.git
  | \.venv
  | migrations
  | staticfiles
  | media
)/
'''

[tool.ruff]
line-length = 100
target-version = "py312"
extend-exclude = [
    "migrations",
    "staticfiles",
    "media",
    ".venv",
]

[tool.ruff.lint]
# Базовый набор для Django-проекта:
#   E,F — pyflakes/pycodestyle (синтаксис, неиспользуемые имена)
#   W   — предупреждения pycodestyle
#   I   — isort (порядок импортов)
#   B   — bugbear (типовые ловушки)
#   UP  — pyupgrade (современный синтаксис)
#   DJ  — flake8-django
#   C4  — comprehensions
select = ["E", "F", "W", "I", "B", "UP", "DJ", "C4"]
ignore = [
    "E501",  # длинные строки — оставляем на совесть black
    "B008",  # вызовы в дефолтных аргументах (Django: models.ForeignKey(...))
    "DJ001", # null=True для CharField — иногда нужно
]

[tool.ruff.lint.per-file-ignores]
"**/migrations/*.py" = ["E", "F", "W", "I", "B", "UP", "DJ", "C4"]
"**/tests/**" = ["DJ", "B"]
"conftest.py" = ["E402"]
"config/settings.py" = ["E402"]

[tool.ruff.lint.isort]
known-first-party = ["apps", "config"]

[tool.mypy]
python_version = "3.12"
ignore_missing_imports = true
warn_unused_ignores = false
warn_redundant_casts = true
check_untyped_defs = false
# Lenient режим: не валим CI на каждом нюансе Django ORM,
# но ловим базовые ошибки типов.
exclude = "(migrations|staticfiles|media|\\.venv)/"

[[tool.mypy.overrides]]
module = "apps.*.migrations.*"
ignore_errors = true

[tool.pytest.ini_options]
DJANGO_SETTINGS_MODULE = "config.test_settings"
python_files = ["test_*.py", "*_test.py"]
addopts = "-ra --tb=short"
testpaths = ["tests"]
